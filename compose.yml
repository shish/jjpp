services:
  # Gerrit Code Review
  gerrit:
    image: gerritcodereview/gerrit:latest
    ports:
      - "8080:8080"
      - "29418:29418"
    environment:
      CANONICAL_WEB_URL: "http://gerrit.localhost:8080/"
      GERRIT_INIT_ARGS: |
        --install-plugin=download-commands
        --install-plugin=replication
        --install-plugin=webhook-events
      GERRIT_HEAPDUMP: "false"
    volumes:
      - gerrit_data:/var/gerrit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Phabricator
  phabricator-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "phabricator"
      MYSQL_DATABASE: "phabricator"
    volumes:
      - phab_mysql:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pphabricator",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  phabricator:
    image: phabricator/phabricator:latest
    ports:
      - "8081:80"
    volumes:
      - phab_repo:/var/lib/repo
    depends_on:
      phabricator-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://phab.localhost/status/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    post_start:
      - command:
          - sh
          - -c
          - |
            set -e
            # basic settings
            bin/config set mysql.host phabricator-mysql
            bin/config set mysql.user root
            bin/config set mysql.pass phabricator
            bin/config set phabricator.base-uri http://phab.localhost:8081/
            bin/config set differential.allow-self-accept true
            # enable http server for diffusion (git) repositories
            bin/config set diffusion.allow-http-auth true
            bin/config set environment.append-paths '["/usr/lib/git-core"]'
            # install db
            bin/storage upgrade --force
            # start backend daemons
            runuser -u www-data bin/phd start

  # Gitea
  gitea:
    image: docker.gitea.com/gitea:1.26.2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
    volumes:
      - gitea_data:/data
    ports:
      - "8082:3000"
      - "222:22"

volumes:
  gerrit_data:
  phab_repo:
  phab_mysql:
  gitea_data:
