services:
  # Gerrit Code Review
  gerrit:
    image: gerritcodereview/gerrit:latest
    ports:
      - "8080:8080"
      - "29418:29418"
    environment:
      CANONICAL_WEB_URL: "http://gerrit.localhost:8080/"
      GERRIT_INIT_ARGS: |
        --install-plugin=download-commands
        --install-plugin=replication
        --install-plugin=webhook-events
      GERRIT_HEAPDUMP: "false"
    volumes:
      - gerrit_data:/var/gerrit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Phabricator
  phabricator-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "phabricator"
      MYSQL_DATABASE: "phabricator"
    volumes:
      - phab_mysql:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pphabricator",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  phabricator:
    image: phabricator/phabricator:latest
    ports:
      - "8081:80"
    volumes:
      - phab_data:/srv/phabricator/phabricator
      - phab_arcanist:/srv/phabricator/arcanist
    depends_on:
      phabricator-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://phab.localhost/status/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    post_start:
      - command:
          - sh
          - -c
          - |
            set -e
            bin/config set mysql.host phabricator-mysql
            bin/config set mysql.user root
            bin/config set mysql.pass phabricator
            bin/config set phabricator.base-uri http://phab.localhost:8081/
            bin/storage upgrade --force
            bin/phd start

volumes:
  gerrit_data:
  phab_data:
  phab_arcanist:
  phab_mysql:
